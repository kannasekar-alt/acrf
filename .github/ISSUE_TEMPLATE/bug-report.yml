name: Bug report
description: Report a bug in the ACRF reference tool (Python package or CLI).
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. For methodology issues, please use the "Methodology change proposal" template instead.

  - type: input
    id: version
    attributes:
      label: ACRF version
      description: Output of `acrf --version`.
      placeholder: "acrf 0.1.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.3"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Ubuntu 24.04"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug, including any error output.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: A minimal system description (inline or as a gist) and the exact command you ran.
    validations:
      required: true
